name: publish
on:
  release:
    types: [published]
  push:
    tags: ["v*"]           # a version tag publishes the pyproject version
  workflow_dispatch:        # or trigger manually from the Actions tab
permissions:
  contents: read
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # PyPI Trusted Publishing (OIDC) — no API token stored anywhere
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
